# openspec/config.yaml — La Zíngara / tfm-restaurant
schema: spec-driven

context: |
  Project: La Zíngara restaurant platform (www.lazingara.es), Santa María del Páramo, León, Spain.
  Stack: Nuxt 3+/4+ (SSR public + SPA admin at /cocina), Tailwind CSS, konva+vue-konva (Canvas 2D),
         Supabase (PostgreSQL, Realtime, Auth, Storage), VPS deploy (persistent Node).
  Status: Nuxt 4.4.8 app bootstrapped (Change #1 archived 2026-06-28). Change #2 `public-pages-design`
          ARCHIVED 2026-06-29. 6 public pages (/carta, /menu-diario, /reservas, /eventos, /contacto, /)
          implemented with mock data + provider-agnostic SMS verification module. 202 Vitest + 14 Playwright
          tests green, 87.86% coverage, 38/38 reqs + 104/104 scenarios verified.
          Change #3 `panel-auth` ARCHIVED 2026-07-01. Admin panel (/cocina) with Supabase Auth (email/password),
          2 roles (admin/editor) + jsonb permissions, 8 admin SPA pages, 3-tier middleware, 7-table DB + RLS
          + profiles trigger. Public pages migrated from mock → Supabase. 53/53 reqs + 75/75 scenarios verified,
          384 unit tests (82.22% coverage). 15 delta specs synced to openspec/specs/.
          Next: Phase 3 (Konva mesas — interactive table manager with fusion logic + Realtime sync).
  Data model: configuracion, platos, mesas, reservas, profiles, eventos, menu_diario_config, menu_diario_items.
  Routes: public 6 pages, admin 8 pages under /cocina.
  Conventions: Vue 3 Composition API + <script setup> + TypeScript, file-based routing, utility-first Tailwind,
               @supabase/supabase-js (never expose service_role key on client).
  NFRs: OWASP Top 10 (2025) + RLS on all tables, TDD mandatory, 60 FPS Canvas table manager.

rules:
  proposal:
    - Include rollback plan for risky changes
    - 'Tag Phase (1: MVP public, 2: admin+auth, 3: Konva engine)'
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - UI copy (user-facing) MUST be Spanish (es-ES, neutral); code/comments in English
  design:
    - Include sequence diagrams for complex flows (e.g., table fusion, Realtime sync)
    - Document architecture decisions with rationale
    - Prefer Nuxt server routes over separate backend; Supabase handles auth/data
  tasks:
    - Group by phase, use hierarchical numbering (1.1, 1.2, …)
    - Keep tasks completable in one session
    - TDD: tests MUST be written before or alongside implementation
  apply:
    - Follow existing code patterns (Composition API, Tailwind utilities, file-based routing)
    - Never expose Supabase service_role key on client
    - All DB changes via Supabase migration tool; never hardcode generated IDs
  verify:
    test_command: 'pnpm vitest run'
    build_command: 'pnpm nuxi build'
    coverage_threshold: 70
  archive:
    - Warn before merging destructive deltas

strict_tdd: true

testing:
  note: |
    INSTALLED during Change #1 bootstrap. Vitest 4.1.0 + @vue/test-utils 2.4.11 +
    @nuxt/test-utils 4.0.0 + happy-dom 20.0.11 (unit/integration), Playwright 1.61.0 (e2e).
    3 smoke tests green (unit/nuxt/e2e) targeting app/pages/index.vue placeholder.
    Coverage: @vitest/coverage-v8 configured (82.22% on panel-auth, threshold 70%).
  runner:
    framework: Vitest
    command: 'pnpm vitest run'
    deps: ['vitest', '@vue/test-utils', '@nuxt/test-utils', 'happy-dom']
  layers:
    unit:
      available: true
      tool: 'Vitest + @vue/test-utils'
    integration:
      available: true
      tool: '@nuxt/test-utils (Vitest)'
    e2e:
      available: true
      tool: 'Playwright'
      command: 'pnpm playwright test'
  coverage:
    available: true
    command: 'pnpm vitest run --coverage'
    tool: 'v8 (Vitest built-in)'
  quality:
    linter:
      available: true
      tool: 'ESLint (@nuxt/eslint)'
      command: 'pnpm eslint .'
    type_checker:
      available: true
      tool: 'vue-tsc'
      command: 'pnpm vue-tsc --noEmit'
    formatter:
      available: true
      tool: 'Prettier'
      command: 'pnpm prettier --check .'
